# ============================================================================
# LARRY G-FORCE — Docker Compose (new src/ layout)
#
# IMPORTANT: if Ollama already runs natively on this Windows host, it owns
# port 11434 — either stop the native service before `up`, or remove the
# ports: mapping on the ollama service (containers reach it internally).
#
# Quick start:
#   docker compose build
#   docker compose up -d ollama
#   docker compose --profile init up model-init     # one-time: pull bases + create LocalLarry models (~30GB)
#   docker compose run --rm agent python main.py status
#   docker compose up -d agent                      # starts services + Telegram bot
#
# One-off orchestrated task:
#   docker compose run --rm agent python main.py auto "your goal here"
#
# GPU passthrough needs Docker Desktop with WSL2 backend + NVIDIA toolkit.
# ============================================================================

services:

  # ── Ollama — local LLM inference (RTX 4060 Ti passthrough) ──────────────
  ollama:
    image: ollama/ollama:latest
    container_name: locallarry-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      # Modelfiles for the LocalLarry-* tuned models (used by model-init)
      - ../ollama_modelfiles:/modelfiles:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── One-time model bootstrap: pull bases, build LocalLarry-* ────────────
  # Heavy (~30GB of downloads into the ollama_data volume). Run once:
  #   docker compose --profile init up model-init
  model-init:
    image: ollama/ollama:latest
    container_name: locallarry-model-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ../ollama_modelfiles:/modelfiles:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull qwen3-coder:30b-a3b-q4_K_M &&
       ollama pull qwen3:8b &&
       ollama pull dolphin3:8b &&
       ollama pull nomic-embed-text:latest &&
       ollama create LocalLarry-15b -f /modelfiles/Modelfile.LocalLarry-15b &&
       ollama create LocalLarry-Fast -f /modelfiles/Modelfile.LocalLarry-Fast &&
       ollama create LocalLarry-Uncensored -f /modelfiles/Modelfile.LocalLarry-Uncensored &&
       ollama list"
    profiles:
      - init

  # ── The agent: services + Telegram bot (python main.py all) ─────────────
  agent:
    build: .
    image: locallarry-agent:latest
    container_name: locallarry-agent
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_NUM_PARALLEL=1
    # Telegram token etc. — copy the repo-root .env next to this compose file
    # or adjust the path; required:false keeps `up` working without it.
    env_file:
      - path: ../.env
        required: false
    volumes:
      - agent_memory:/app/memory     # chroma_db + tasks.db + skills.db + sessions.db
      - agent_logs:/app/logs
      - agent_sandbox:/app/sandbox
      - agent_exports:/app/exports
    restart: unless-stopped

  # ── HTTP API (stdlib, no extra deps) — drive the agent over JSON ────────
  #   Set LARRY_API_TOKEN in your shell or .env first (else one is generated
  #   and printed in the container logs: docker logs locallarry-api).
  #   docker compose --profile api up -d api
  #   curl localhost:7333/health
  #   curl -H "Authorization: Bearer $LARRY_API_TOKEN" \
  #        -X POST localhost:7333/auto -d '{"goal":"check ollama status"}'
  api:
    build: .
    image: locallarry-agent:latest
    container_name: locallarry-api
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "7333:7333"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_NUM_PARALLEL=1
      - LARRY_API_PORT=7333
      - LARRY_API_TOKEN=${LARRY_API_TOKEN:-}
    volumes:
      - agent_memory:/app/memory
      - agent_logs:/app/logs
      - agent_sandbox:/app/sandbox
      - agent_exports:/app/exports
    command: ["python", "main.py", "serve"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7333/health',timeout=5).status==200 else 1)"]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    profiles:
      - api

volumes:
  ollama_data:
  agent_memory:
  agent_logs:
  agent_sandbox:
  agent_exports:
